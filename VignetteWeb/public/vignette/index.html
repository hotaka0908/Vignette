<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>Vignette — Lifelog</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header>
    <a href="./" id="back" hidden aria-label="Back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5"></path><path d="M12 19l-7-7 7-7"></path>
      </svg>
    </a>
    <h1 id="title">Vignette</h1>
    <button id="refresh" aria-label="Reload">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12a9 9 0 1 1-3-6.7L21 8"></path>
        <path d="M21 3v5h-5"></path>
      </svg>
    </button>
  </header>
  <main id="content">
    <p class="muted">Loading…</p>
  </main>
  <nav class="bottom-nav" id="bottom-nav">
    <a href="?tab=photos" data-tab="photos">
      <div class="nav-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="6" width="18" height="14" rx="2"></rect>
          <path d="M8 6l1.5-2h5L16 6"></path>
          <circle cx="12" cy="13" r="3.5"></circle>
        </svg>
      </div>
      <div class="nav-label">Photos</div>
    </a>
    <a href="?tab=videos" data-tab="videos">
      <div class="nav-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="5" width="14" height="14" rx="2"></rect>
          <path d="M17 9l4-2v10l-4-2z"></path>
        </svg>
      </div>
      <div class="nav-label">Videos</div>
    </a>
  </nav>
  <script type="module" src="./app.js"></script>
</body>
</html>
